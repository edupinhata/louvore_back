spring:
  application:
    name: louvore-back
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/louvore}
    username: ${DB_USERNAME:louvore}
    password: ${DB_PASSWORD:louvore}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:louvore-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
