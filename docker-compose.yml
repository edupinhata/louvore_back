version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: louvore-postgres
    environment:
      POSTGRES_DB: louvore
      POSTGRES_USER: louvore
      POSTGRES_PASSWORD: louvore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U louvore"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: louvore-back
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/louvore
      DB_USERNAME: louvore
      DB_PASSWORD: louvore
      JWT_SECRET: change-this-secret-in-production-at-least-256-bits-long
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
